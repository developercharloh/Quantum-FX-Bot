services:
  - type: static
    name: quantum-fx-bot
    buildCommand: curl -fsSL https://github.com/pnpm/pnpm/releases/download/v10.26.1/pnpm-linuxstatic-x64 -o /tmp/pnpm && chmod +x /tmp/pnpm && /tmp/pnpm install --frozen-lockfile && /tmp/pnpm --filter @workspace/quantum-fx-bot run build
    staticPublishPath: artifacts/quantum-fx-bot/dist/public
    branch: main
    envVars:
      - key: PORT
        value: 3000
      - key: BASE_PATH
        value: /
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: static
    name: admin-app
    buildCommand: curl -fsSL https://github.com/pnpm/pnpm/releases/download/v10.26.1/pnpm-linuxstatic-x64 -o /tmp/pnpm && chmod +x /tmp/pnpm && /tmp/pnpm install --frozen-lockfile && /tmp/pnpm --filter @workspace/admin-app run build
    staticPublishPath: artifacts/admin-app/dist/public
    branch: main
    envVars:
      - key: PORT
        value: 3001
      - key: BASE_PATH
        value: /admin-app/
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

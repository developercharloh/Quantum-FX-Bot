services:
  - type: static
    name: quantum-fx-bot
    buildCommand: echo "serving pre-built dist"
    staticPublishPath: artifacts/quantum-fx-bot/dist/public
    branch: main
    envVars:
      - key: PORT
        value: 3000
      - key: BASE_PATH
        value: /
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: static
    name: admin-app
    buildCommand: echo "serving pre-built dist"
    staticPublishPath: artifacts/admin-app/dist/public
    branch: main
    envVars:
      - key: PORT
        value: 3001
      - key: BASE_PATH
        value: /admin-app/
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
